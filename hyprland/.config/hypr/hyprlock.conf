source = $HOME/.config/hypr/mocha.conf

$accent = $mauve
$accentAlpha = $mauveAlpha
$font = JetBrainsMono Nerd Font

# GENERAL
general {
    disable_loading = true
    hide_cursor = true
}

# BACKGROUND
background {
    monitor =
    path = /path/to/your/wallpaper.png  # Update this!
    blur_passes = 2
    color = $base
}

# TIME (Big Clock)
label {
    monitor =
    text = $TIME
    color = $text
    font_size = 90
    font_family = $font
    position = 0, 100
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    color = $text
    font_size = 24
    font_family = $font
    position = 0, 10
    halign = center
    valign = center
}

# KEYBOARD LAYOUT
label {
    monitor =
    text = 󰌌  $LAYOUT
    color = $subtext0
    font_size = 14
    font_family = $font
    position = 0, -100
    halign = center
    valign = bottom
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = $accent
    inner_color = $surface0
    font_color = $text
    fade_on_empty = false
    placeholder_text = <span foreground="##$textAlpha"><i>Logged in as </i><b>$USER</b></span>
    hide_input = false
    check_color = $accent
    fail_color = $red
    position = 0, -60
    halign = center
    valign = center
}
